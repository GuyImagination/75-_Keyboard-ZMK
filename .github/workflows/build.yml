name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  fix-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip BOM and fix typo
        run: |
          sed -i '1s/^\xEF\xBB\xBF//' config/boards/shields/Eyesore/Eyesore.keymap
          sed -i 's/conatins/contains/' config/boards/shields/Eyesore/Kconfig.shield

      - name: Commit fixes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --quiet || (git add -A && git commit -m "ci: strip BOM and fix typo" && git push)

  build:
    needs: fix-files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
          key: ${{ runner.os }}-west-${{ hashFiles('**/west.yml') }}

      - name: Build ZMK
        uses: zmkfirmware/zmk-build-action@v2
        with:
          board: nice_nano_v2
          shield: Eyesore
          # This is where the magic happens:
          # It points ZMK to the folder where west downloaded your 595 driver.
          extra_modules: zmk-595