name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  fix-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Strip BOM and fix typo
        run: |
          sed -i '1s/^\xEF\xBB\xBF//' config/boards/shields/Eyesore/Eyesore.keymap
          sed -i 's/conatins/contains/' config/boards/shields/Eyesore/Kconfig.shield

      - name: Commit fixes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git diff --quiet || (git add -A && git commit -m "ci: strip BOM and fix typo" && git push)

  build:
    needs: fix-files
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      # This tells the build script to look into the downloaded module
      extra_modules: modules/zmk-595